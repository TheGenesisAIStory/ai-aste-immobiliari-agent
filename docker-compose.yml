services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    environment:
      DATABASE_URL: sqlite:///./data/processed/app.db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt &&
      uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
